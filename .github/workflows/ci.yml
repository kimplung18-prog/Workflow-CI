name: CI - MLflow Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn conda-lock

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=./mlruns" >> $GITHUB_ENV

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Install Python dependencies
        run: pip install mlflow==2.19.0

      - name: Get latest MLflow run_id
        run: |
          python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient('./MLProject/mlruns')
          experiments = client.search_experiments()
          for exp in experiments:
              runs = client.search_runs(exp.experiment_id, order_by=['start_time DESC'], max_results=1)
              if runs:
                  print('Latest run_id:', runs[0].info.run_id)
                  break
          "

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/